name: Node.js CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Node ${{ matrix.node-version }} on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18.x, 20.x, 22.x]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Check version
        run: node ./bin/arabic-cli-fix.js --version

      - name: Run doctor
        run: node ./bin/arabic-cli-fix.js doctor

      - name: Run test (Arabic rendering check)
        run: node ./bin/arabic-cli-fix.js test

      - name: Run setup
        run: node ./bin/arabic-cli-fix.js setup

      - name: Run fix
        run: node ./bin/arabic-cli-fix.js fix

      - name: Run init-ai (dry run in temp dir)
        run: node ./bin/arabic-cli-fix.js init-ai --dir ./tmp-ci-test

      - name: Run output (dry run in temp dir)
        run: node ./bin/arabic-cli-fix.js output --dir ./tmp-ci-test

      - name: Run unknown command (expect exit 1)
        run: node ./bin/arabic-cli-fix.js notacommand; if [ $? -ne 1 ]; then exit 1; fi
        if: runner.os != 'Windows'
        shell: bash

      - name: Run node tests
        run: npm test

name: Node.js CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Node ${{ matrix.node-version }} on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18.x, 20.x, 22.x]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Check version
        run: node ./bin/arabic-cli-fix.js --version

      - name: Run doctor
        run: node ./bin/arabic-cli-fix.js doctor

      - name: Run test (Arabic rendering check)
        run: node ./bin/arabic-cli-fix.js test

      - name: Run setup
        run: node ./bin/arabic-cli-fix.js setup

      - name: Run fix
        run: node ./bin/arabic-cli-fix.js fix

      - name: Run init-ai (in temp dir)
        run: node ./bin/arabic-cli-fix.js init-ai --dir ./tmp-ci-test

      - name: Run init-ai --force (overwrite)
        run: node ./bin/arabic-cli-fix.js init-ai --force --dir ./tmp-ci-test

      - name: Run output (in temp dir)
        run: node ./bin/arabic-cli-fix.js output --dir ./tmp-ci-test

      - name: Verify unknown command exits non-zero
        shell: bash
        run: |
          set +e
          node ./bin/arabic-cli-fix.js notacommand
          code=$?
          set -e
          if [ "$code" -ne 1 ]; then
            echo "Expected exit code 1, got $code"
            exit 1
          fi
        if: runner.os != 'Windows'

      - name: Verify unknown command exits non-zero (Windows)
        shell: pwsh
        run: |
          node ./bin/arabic-cli-fix.js notacommand
          if ($LASTEXITCODE -ne 1) {
            Write-Error "Expected exit code 1, got $LASTEXITCODE"
            exit 1
          }
        if: runner.os == 'Windows'
